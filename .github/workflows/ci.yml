name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Frontend lint
        run: npm run lint -w vibedown-frontend

      - name: Frontend build
        run: npm run build -w vibedown-frontend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend syntax
        run: python -m py_compile backend/main.py
